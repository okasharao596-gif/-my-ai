<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index.html</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f0b1e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  #app {
    width: 100%;
    max-width: 720px;
    height: 90vh;
    max-height: 750px;
    display: flex;
    flex-direction: column;
    background: #1a1030;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #3a2060;
    box-shadow: 0 0 60px #7F77DD22;
  }

  /* Header */
  #header {
    background: #12082a;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #2a1650;
    flex-shrink: 0;
  }
  .logo {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7F77DD, #5DCAA5);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: white; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .bot-name { font-size: 16px; font-weight: 600; color: #fff; }
  .bot-status { font-size: 12px; color: #9FE1CB; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 7px; height: 7px; background: #5DCAA5; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .powered-badge {
    font-size: 11px; color: #AFA9EC;
    background: #2a1650; border: 1px solid #534AB7;
    padding: 4px 10px; border-radius: 20px;
  }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
    background: #0f0b1e;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #3a2060; border-radius: 4px; }

  .msg { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .msg.ai .avatar { background: linear-gradient(135deg, #7F77DD, #5DCAA5); color: white; }
  .msg.user .avatar { background: #534AB7; color: white; }

  .bubble {
    padding: 10px 15px; font-size: 14px;
    line-height: 1.65; word-break: break-word;
  }
  .msg.ai .bubble {
    background: #1e1440; color: #e8e0ff;
    border: 1px solid #2a1a50;
    border-radius: 18px 18px 18px 4px;
  }
  .msg.user .bubble {
    background: #534AB7; color: #fff;
    border-radius: 18px 18px 4px 18px;
  }

  /* Typing */
  .typing-bubble {
    background: #1e1440; border: 1px solid #2a1a50;
    border-radius: 18px 18px 18px 4px;
    padding: 14px 18px; display: flex; gap: 5px; align-items: center;
  }
  .typing-bubble span {
    width: 8px; height: 8px; background: #7F77DD;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }

  /* Suggestions */
  #suggestions {
    padding: 10px 16px 6px;
    display: flex; gap: 8px; flex-wrap: wrap;
    background: #0f0b1e;
  }
  .sug-btn {
    font-size: 12px; padding: 6px 14px;
    border-radius: 20px; border: 1px solid #3a2060;
    background: #1a1030; color: #AFA9EC;
    cursor: pointer; white-space: nowrap;
    transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .sug-btn:hover { border-color: #7F77DD; color: #CECBF6; background: #24164a; }

  /* Input */
  #input-area {
    padding: 12px 16px 16px;
    display: flex; gap: 10px; align-items: flex-end;
    background: #12082a;
    border-top: 1px solid #2a1650;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1; resize: none;
    border: 1px solid #3a2060; border-radius: 22px;
    padding: 10px 16px; font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: #e8e0ff; background: #1a1030;
    outline: none; max-height: 120px; line-height: 1.5;
  }
  #user-input::placeholder { color: #6a5a8a; }
  #user-input:focus { border-color: #7F77DD; }
  #send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #534AB7, #7F77DD);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.3; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Name edit banner */
  #name-banner {
    background: #1e1440; border-bottom: 1px solid #2a1650;
    padding: 8px 16px; font-size: 12px; color: #9FE1CB;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #name-banner input {
    background: #12082a; border: 1px solid #3a2060;
    border-radius: 8px; padding: 4px 10px;
    color: #fff; font-size: 12px; font-family: 'Inter', sans-serif;
    outline: none; width: 160px;
  }
  #name-banner button {
    background: #534AB7; border: none; border-radius: 8px;
    padding: 4px 12px; color: #fff; font-size: 12px;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }

  @media (max-width: 480px) {
    #app { height: 100vh; max-height: 100vh; border-radius: 0; }
    body { padding: 0; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="logo" id="logo-letter">M</div>
    <div class="header-info">
      <div class="bot-name" id="bot-name-display">My AI</div>
      <div class="bot-status"><span class="status-dot"></span>Online — hamesha ready</div>
    </div>
    <div class="powered-badge">AI Powered</div>
  </div>

  <!-- Name change banner -->
  <div id="name-banner">
    ✏️ Apna naam likho:
    <input type="text" id="name-input" placeholder="Jaise: Zain AI" maxlength="20">
    <button onclick="changeName()">Save</button>
  </div>

  <div id="messages">
    <div class="msg ai">
      <div class="avatar" id="ai-avatar">M</div>
      <div class="bubble">
        Assalamu Alaikum! 👋 Main aapka personal AI assistant hoon. Kuch bhi poochein — design ideas, coding, general knowledge, ya koi sawaal!
      </div>
    </div>
  </div>

  <div id="suggestions">
    <button class="sug-btn" onclick="sendSug('Mujhe ek website ka modern design idea do')">💡 Design idea</button>
    <button class="sug-btn" onclick="sendSug('Python mein ek simple calculator banao')">💻 Python code</button>
    <button class="sug-btn" onclick="sendSug('Pakistan ke baare mein kuch interesting batao')">🇵🇰 Pakistan facts</button>
    <button class="sug-btn" onclick="sendSug('Mujhe ek funny joke sunao')">😄 Joke</button>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Kuch bhi poochein..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  let botName = 'My AI';
  let chatHistory = [];

  function changeName() {
    const val = document.getElementById('name-input').value.trim();
    if (!val) return;
    botName = val;
    document.getElementById('bot-name-display').textContent = botName;
    const letter = val[0].toUpperCase();
    document.getElementById('logo-letter').textContent = letter;
    document.querySelectorAll('.avatar.ai-av').forEach(a => a.textContent = letter);
    document.getElementById('name-banner').style.display = 'none';
  }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');

    const av = document.createElement('div');
    av.className = 'avatar' + (role === 'ai' ? ' ai-av' : '');
    av.textContent = role === 'user' ? 'U' : botName[0].toUpperCase();

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    div.appendChild(av);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-indicator';
    const av = document.createElement('div');
    av.className = 'avatar ai-av';
    av.textContent = botName[0].toUpperCase();
    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(av);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    document.getElementById('suggestions').style.display = 'none';

    addMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    addTyping();

    const systemPrompt = `You are ${botName}, a friendly and helpful AI assistant.
You respond in Roman Urdu mixed with simple English (the way Pakistanis chat).
Keep answers helpful, warm, and conversational — usually 2-4 sentences.
You can help with coding, design, general knowledge, jokes, and anything else.
Never say you are Claude or made by Anthropic. You are ${botName}.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: chatHistory
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || 'Maafi chahta hoon, kuch masla ho gaya. Dobara try karein!';
      removeTyping();
      addMsg('ai', reply);
      chatHistory.push({ role: 'assistant', content: reply });
    } catch (e) {
      removeTyping();
      addMsg('ai', 'Oops! Internet connection check karein aur dobara try karein.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendSug(text) {
    inputEl.value = text;
    sendMessage();
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
